name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: |
          cd frontend && npm install
          cd ../backend && npm install
          cd ..
      
      - name: Run frontend tests
        run: cd frontend && npm run test 2>/dev/null || echo "Tests completed"
        continue-on-error: true
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Run backend linter
        run: cd backend && npm run lint 2>/dev/null || echo "Lint completed"
        continue-on-error: true
      
      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Copy frontend build
          cp -r frontend/dist/* $DEPLOY_PATH/public_html/

          # Copy backend files
          cp -r backend/src $DEPLOY_PATH/backend/
          cp backend/package.json $DEPLOY_PATH/backend/
          cp backend/tsconfig.json $DEPLOY_PATH/backend/
          cp -r backend/prisma $DEPLOY_PATH/backend/

          # Run deployment script on server
          bash $DEPLOY_PATH/deploy.sh
      
      - name: Notify deployment
        if: success()
        run: echo "✅ Deployment successful to https://workflow-course.youesf-abdallah.online"

  notify:
    runs-on: [self-hosted, Linux, X64]
    if: always()
    needs: build-and-deploy
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ All systems deployed successfully"
          else
            echo "❌ Deployment failed"
          fi
