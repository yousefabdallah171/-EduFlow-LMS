name: Test and Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.2

      - name: Install dependencies
        run: pnpm install

      - name: Lint backend
        working-directory: backend
        run: pnpm exec eslint src --max-warnings 0 || true

      - name: Lint frontend
        working-directory: frontend
        run: pnpm exec eslint src --max-warnings 0 || true

      - name: Build backend
        working-directory: backend
        run: pnpm run build
        env:
          NODE_ENV: test

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build
        env:
          NODE_ENV: test

  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy dev via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/youesf-abdallah-workflow-course/htdocs/workflow-course.youesf-abdallah.online
            git fetch origin
            git checkout dev
            git pull origin dev
            ./deploy-local.sh

  deploy-prod:
    needs: test-prod
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy production via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/youesf-abdallah-workflow-course/htdocs/workflow-course.youesf-abdallah.online
            git fetch origin
            git checkout main
            git pull origin main
            ./deploy-local.sh
