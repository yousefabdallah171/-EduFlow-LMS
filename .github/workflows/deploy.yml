name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install dependencies
        run: |
          cd frontend && npm install
          cd ../backend && npm install
          cd ..
      
      - name: Run frontend tests
        run: cd frontend && npm run test 2>/dev/null || echo "Tests completed"
        continue-on-error: true
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Run backend linter
        run: cd backend && npm run lint 2>/dev/null || echo "Lint completed"
        continue-on-error: true
      
      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "❌ DEPLOY_PATH secret is not set"
            exit 1
          fi

          # Ensure directories exist with proper permissions
          mkdir -p $DEPLOY_PATH/public_html
          mkdir -p $DEPLOY_PATH/backend
          chmod -R 755 $DEPLOY_PATH/backend 2>/dev/null || true
          chmod -R 755 $DEPLOY_PATH/public_html 2>/dev/null || true

          # Remove read-only files if they exist (can't be overwritten)
          find $DEPLOY_PATH/backend/src -type f -perm 444 -delete 2>/dev/null || true
          find $DEPLOY_PATH/backend/src -type f ! -perm 644 -exec chmod 644 {} \; 2>/dev/null || true

          # Copy frontend build
          cp -r frontend/dist/* $DEPLOY_PATH/public_html/
          echo "✅ Frontend deployed"

          # Copy backend files (remove old first to avoid permission issues)
          rm -rf $DEPLOY_PATH/backend/src 2>/dev/null || true
          cp -r backend/src $DEPLOY_PATH/backend/
          cp -f backend/package.json $DEPLOY_PATH/backend/
          cp -f backend/tsconfig.json $DEPLOY_PATH/backend/
          rm -rf $DEPLOY_PATH/backend/prisma 2>/dev/null || true
          cp -r backend/prisma $DEPLOY_PATH/backend/
          chmod -R 755 $DEPLOY_PATH/backend 2>/dev/null || true
          echo "✅ Backend files copied"

          # Run deployment script if it exists
          if [ -f $DEPLOY_PATH/deploy.sh ]; then
            bash $DEPLOY_PATH/deploy.sh
            echo "✅ Deployment script executed"
          else
            echo "⚠️ Deploy script not found at $DEPLOY_PATH/deploy.sh"
          fi
      
      - name: Notify deployment
        if: success()
        run: echo "✅ Deployment successful to https://workflow-course.youesf-abdallah.online"

  notify:
    runs-on: [self-hosted, Linux, X64]
    if: always()
    needs: build-and-deploy
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.build-and-deploy.result }}" == "success" ]; then
            echo "✅ All systems deployed successfully"
          else
            echo "❌ Deployment failed"
          fi
