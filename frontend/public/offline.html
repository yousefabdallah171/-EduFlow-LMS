<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #0b0f19;
        color: #e6edf7;
      }
      .card {
        width: min(560px, 100%);
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 18px;
        padding: 20px;
      }
      h1 { margin: 0; font-size: 18px; }
      p { margin: 10px 0 0; opacity: 0.85; line-height: 1.6; }
      a { color: #a3e635; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Reconnect to load the latest content. If you already visited this page before, some assets may still work from cache.</p>
      <p><a href="/">Try again</a></p>
    </div>
  </body>
</html>
