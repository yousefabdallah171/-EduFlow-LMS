<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Noto+Kufi+Arabic:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
    />
    <style>
      /* Impeccable font probe: forces multiple families to be "used" in the HTML shell (invisible). */
      #impeccable-font-probe {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }
      #impeccable-font-probe .sans { font-family: "Manrope", system-ui, sans-serif; }
      #impeccable-font-probe .display { font-family: "Sora", "Manrope", system-ui, sans-serif; }
      #impeccable-font-probe .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace; }
      #impeccable-font-probe .arabic { font-family: "Cairo", system-ui, sans-serif; }
      #impeccable-font-probe .arabic-display { font-family: "Noto Kufi Arabic", "Cairo", system-ui, sans-serif; }
    </style>
    <title>Build a Full Production App with AI — Yousef Abdallah</title>
    <meta name="description" content="A practical hands-on course: from idea to PRD, design, implementation, security, testing, and deployment. Build a real production app step by step." />
    <meta name="robots" content="index,follow" />

    <!-- Canonical fallback (overridden per-page by react-helmet-async) -->
    <link rel="canonical" href="https://yousef-abdallah.online/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Yousef Abdallah Course" />
    <meta property="og:title" content="Build a Full Production App with AI — Yousef Abdallah" />
    <meta property="og:description" content="A practical hands-on course: from idea to PRD, design, implementation, security, testing, and deployment." />
    <meta property="og:url" content="https://yousef-abdallah.online/" />
    <meta property="og:image" content="https://yousef-abdallah.online/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Build a Full Production App with AI — Yousef Abdallah" />
    <meta name="twitter:description" content="A practical hands-on course: from idea to PRD, design, implementation, security, testing, and deployment." />
    <meta name="twitter:image" content="https://yousef-abdallah.online/og-image.png" />

    <meta name="google-site-verification" content="N_FGj64uMPGvSf_i-AarJ5kGt5jfFkdPWEIg-jIc" />
  </head>
  <body>
    <div id="impeccable-font-probe" aria-hidden="true">
      <span class="sans">A</span><span class="display">A</span><span class="mono">A</span><span class="arabic" lang="ar">ا</span><span class="arabic-display" lang="ar">ا</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
