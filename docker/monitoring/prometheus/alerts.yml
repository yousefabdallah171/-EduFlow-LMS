groups:
  - name: eduflow-api
    rules:
      - alert: ApiHigh5xxRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total[5m])), 1)
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx error rate > 1% (5m)"

      - alert: ApiHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_ms_bucket[5m]))
          ) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency > 500ms (5m)"

      - alert: VideoAbuseEventsSpike
        expr: |
          sum(rate(video_security_events_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Spike in VideoSecurityEvent anomalies"

