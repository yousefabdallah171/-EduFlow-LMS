global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'eduflow'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'eduflow-backend'
    scrape_interval: 10s
    metrics_path: '/metrics'
    authorization:
      credentials: '__PROMETHEUS_TOKEN__'
    static_configs:
      - targets: ['localhost:3000']

  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']
