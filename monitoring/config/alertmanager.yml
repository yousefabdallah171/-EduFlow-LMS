global:
  resolve_timeout: 5m
  smtp_smarthost: '__SMTP_HOST__:__SMTP_PORT__'
  smtp_auth_username: '__SMTP_USER__'
  smtp_auth_password: '__SMTP_PASSWORD__'
  smtp_from: '__ALERT_EMAIL_FROM__'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'payment-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'payment-warning'

receivers:
  - name: 'default'
    email_configs:
      - to: '__ALERT_EMAIL__'
        headers:
          Subject: '[Monitoring] {{ .GroupLabels.alertname }}'

  - name: 'payment-critical'
    email_configs:
      - to: '__ALERT_EMAIL__'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: '__SLACK_WEBHOOK_URL__'
        channel: '#alerts-critical'
        title: 'Payment Critical Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

  - name: 'payment-warning'
    email_configs:
      - to: '__ALERT_EMAIL__'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: '__SLACK_WEBHOOK_URL__'
        channel: '#alerts'
        title: 'Payment Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
