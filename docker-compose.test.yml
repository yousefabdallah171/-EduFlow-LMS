version: "3.8"

services:
  test-postgres:
    image: postgres:16-alpine
    container_name: eduflow-test-postgres
    environment:
      POSTGRES_USER: eduflow_test
      POSTGRES_PASSWORD: test_password_123
      POSTGRES_DB: eduflow_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduflow_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - test-postgres-data:/var/lib/postgresql/data

  test-redis:
    image: redis:7-alpine
    container_name: eduflow-test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - test-redis-data:/data

volumes:
  test-postgres-data:
  test-redis-data:
