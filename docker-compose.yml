services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    command: sh -c "cd /app/frontend && pnpm dev --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_API_PROXY_TARGET: "http://backend:3000"
    networks:
      - eduflow_net
    ports:
      - "80:5173"
    volumes:
      - .:/app
      - frontend_workspace_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    command: sh -c "pnpm prisma:generate && until pnpm exec prisma migrate deploy; do echo 'Waiting for database...'; sleep 2; done; pnpm exec prisma db seed && pnpm dev"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
    networks:
      - eduflow_net
    volumes:
      - .:/app
      - backend_workspace_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
      - video_storage:/app/backend/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - eduflow_net
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - eduflow_net
    volumes:
      - redisdata:/data

networks:
  eduflow_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  video_storage:
  frontend_workspace_node_modules:
  frontend_node_modules:
  backend_workspace_node_modules:
  backend_node_modules:
