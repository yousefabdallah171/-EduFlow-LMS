services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    command: sh -c "cd /app/frontend && pnpm dev --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_API_PROXY_TARGET: "http://backend:3000"
    networks:
      - eduflow_net
    ports:
      - "80:5173"
    volumes:
      - .:/app
      - frontend_workspace_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    command: sh -c "cd /app && pnpm --filter backend prisma:generate && until (pnpm --filter backend exec prisma migrate deploy || pnpm --filter backend exec prisma db push --skip-generate); do echo 'Waiting for database...'; sleep 2; done; pnpm --filter backend prisma:seed && pnpm --filter backend dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: ${NODE_ENV}
      BACKEND_PORT: ${BACKEND_PORT}
    networks:
      - eduflow_net
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - backend_workspace_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
      - video_storage:/app/backend/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - eduflow_net
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - eduflow_net
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

networks:
  eduflow_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  video_storage:
  frontend_workspace_node_modules:
  frontend_node_modules:
  backend_workspace_node_modules:
  backend_node_modules:
