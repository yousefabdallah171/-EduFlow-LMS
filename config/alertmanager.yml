global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_from: '${ALERT_EMAIL_FROM}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical payment alerts
    - match:
        severity: critical
      receiver: 'payment-critical'
      group_wait: 10s
      repeat_interval: 1h

    # Payment warning alerts
    - match:
        severity: warning
      receiver: 'payment-warning'
      group_wait: 30s
      repeat_interval: 4h

    # Database alerts
    - match:
        alertname: 'SlowDatabaseQueries'
      receiver: 'database-alerts'

    # Webhook alerts
    - match:
        alertname: 'WebhookProcessingErrors'
      receiver: 'webhook-alerts'

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'payment-critical'
    email_configs:
      - to: '${ALERT_EMAIL}'
        headers:
          Subject: '[CRITICAL] Payment System Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Critical Payment Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          {{ range .Alerts }}
          <p>{{ .Annotations.description }}</p>
          {{ end }}
          <p>Please investigate immediately.</p>
    slack_configs:
      - channel: '#payment-alerts'
        color: 'danger'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'payment-warning'
    email_configs:
      - to: '${ALERT_EMAIL}'
        headers:
          Subject: '[WARNING] Payment System Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Payment System Warning</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          {{ range .Alerts }}
          <p>{{ .Annotations.description }}</p>
          {{ end }}
    slack_configs:
      - channel: '#payment-alerts'
        color: 'warning'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'database-alerts'
    slack_configs:
      - channel: '#infrastructure'
        color: 'good'
        title: '📊 Database: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'webhook-alerts'
    slack_configs:
      - channel: '#webhook-alerts'
        color: 'warning'
        title: '🪝 Webhook: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
