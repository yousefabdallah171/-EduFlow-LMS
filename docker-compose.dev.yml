services:
  frontend:
    profiles:
      - proxy
    build:
      context: .
      dockerfile: docker/frontend-proxy.Dockerfile
    depends_on:
      frontend-dev:
        condition: service_healthy
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

  frontend-dev:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    command: sh -c "cd /app/frontend && pnpm dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - eduflow_net
    volumes:
      - .:/app
      - frontend_workspace_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    command: >
      sh -c "cd /app/backend &&
      pnpm prisma generate &&
      pnpm prisma migrate deploy --schema prisma/schema.prisma &&
      pnpm prisma:seed &&
      pnpm dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - backend_workspace_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules

  backend-bootstrap:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    command: >
      sh -c "cd /app/backend &&
      pnpm prisma generate &&
      pnpm prisma migrate deploy --schema prisma/schema.prisma &&
      pnpm prisma:seed"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    networks:
      - eduflow_net
    profiles:
      - tools
    volumes:
      - .:/app
      - backend_workspace_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules

volumes:
  frontend_workspace_node_modules:
  backend_workspace_node_modules:
  frontend_node_modules:
  backend_node_modules:
